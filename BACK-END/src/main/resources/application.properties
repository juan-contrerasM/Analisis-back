server.port=8080

# ETL en segundo plano (task scheduler de Spring; no usa hilos HTTP).
# fixed-delay = espera tras TERMINAR el ETL anterior (evita solapes).
etl.scheduled.enabled=true
# Primer arranque: 2 min tras levantar la app (deja que el servidor estabilice).
etl.scheduled.initial-delay-ms=60000
# Tras cada ETL completo, esperar 1 h antes del siguiente (ajusta si tu ETL tarda más).3600000
etl.scheduled.fixed-delay-ms=60000
app.csv.path=data/dataset.csv