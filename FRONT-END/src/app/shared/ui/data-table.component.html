<div class="table-toolbar">
  <input
    type="search"
    class="filter"
    placeholder="Filtrar filas…"
    [value]="filterText()"
    (input)="filterText.set($any($event.target).value)"
  />
  <span class="count">{{ filteredRows().length }} filas</span>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        @for (col of columns(); track col.key) {
          <th (click)="sortBy(col.key)" [class.sorted]="sortKey() === col.key">
            {{ col.label }} <span class="sort-ind">{{ sortIcon(col.key) }}</span>
          </th>
        }
      </tr>
    </thead>
    <tbody>
      @for (row of filteredRows(); track $index) {
        <tr>
          @for (col of columns(); track col.key) {
            <td>{{ displayCell(row, col.key) }}</td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>
